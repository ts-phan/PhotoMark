<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoSnap">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>GeoSnap</title>
  <style>
    :root {
      --red:  #E8202A;
      --white:#F0F0F5;
      --mono: "SF Mono","Fira Code","Courier New",monospace;
      --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#000;
      font-family:var(--sans);
      color:var(--white);
    }

    /* ══ STAGE — vrai plein écran ══ */
    #stage {
      position:fixed;
      top:0; left:0; right:0; bottom:0;
    }

    /* Vidéo couvre tout */
    #live-video {
      position:absolute;
      inset:0; width:100%; height:100%;
      object-fit:cover;
      display:block;
    }

    /* Canvas live-annotation : par-dessus la vidéo, transparent, pointer-events none */
    #live-overlay {
      position:absolute;
      inset:0; width:100%; height:100%;
      pointer-events:none;
      display:block;
    }

    /* Canvas final (capture) — même taille */
    #annotated {
      position:absolute;
      inset:0; width:100%; height:100%;
      object-fit:cover;
      display:none;
    }

    /* ══ HEADER flottant ══ */
    #hdr {
      position:absolute;
      top:0; left:0; right:0;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px 14px;
      padding-top: max(14px, env(safe-area-inset-top) + 8px);
      background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,transparent 100%);
    }
    .logo {
      display:flex; align-items:center; gap:8px;
      font-size:17px; font-weight:700; letter-spacing:-.3px;
    }
    .logo-dot {
      width:8px; height:8px; background:var(--red);
      border-radius:50%; box-shadow:0 0 6px var(--red);
    }
    .logo span { color:var(--red); }
    .tab-group {
      display:flex; gap:3px;
      background:rgba(0,0,0,.50);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-radius:22px; padding:3px;
      border:1px solid rgba(255,255,255,.12);
    }
    .tab {
      padding:7px 15px;
      font-size:13px; font-weight:600;
      border:none; border-radius:18px;
      cursor:pointer; color:rgba(255,255,255,.55);
      background:transparent;
      transition:background .2s,color .2s;
      -webkit-tap-highlight-color:transparent;
    }
    .tab.active { background:var(--red); color:white; }

    /* GPS dot minuscule */
    #gps-dot {
      position:absolute;
      top: max(18px, env(safe-area-inset-top) + 10px);
      left:50%; transform:translateX(-50%);
      width:6px; height:6px;
      border-radius:50%; background:#444;
      transition:background .4s,box-shadow .4s;
      z-index:31; pointer-events:none;
    }
    #gps-dot.active { background:#4ade80; box-shadow:0 0 5px #4ade80; }
    #gps-dot.error  { background:var(--red); }

    /* ══ BOTTOM flottant ══ */
    #bottom {
      position:absolute;
      bottom:0; left:0; right:0;
      z-index:30;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-bottom: max(28px, env(safe-area-inset-bottom) + 18px);
      background:linear-gradient(to top,rgba(0,0,0,.45) 0%,transparent 100%);
      pointer-events:none;
    }
    #bottom > * { pointer-events:auto; }

    /* Bouton déclencheur */
    #shutter-btn {
      width:70px; height:70px; border-radius:50%;
      background:transparent;
      border:3px solid rgba(255,255,255,.85);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      display:flex; align-items:center; justify-content:center;
      transition:transform .1s;
      position:relative;
      margin-top:14px;
    }
    #shutter-btn::after {
      content:'';
      width:54px; height:54px; border-radius:50%;
      background:white; position:absolute;
      transition:transform .08s, background .08s;
    }
    #shutter-btn:active { transform:scale(.91); }
    #shutter-btn:active::after { background:#bbb; }

    /* Flash feedback */
    #flash {
      position:absolute; inset:0;
      background:white; opacity:0;
      pointer-events:none; z-index:50;
      transition:opacity .08s;
    }
    #flash.go { opacity:.7; }

    /* Fallback si pas getUserMedia */
    label#cam-fallback {
      display:none; margin-top:14px;
      padding:13px 28px; background:var(--red);
      color:white; font-size:15px; font-weight:600;
      border-radius:30px; cursor:pointer;
    }
    label#cam-fallback.show { display:block; }
    input[type="file"] { display:none; }

    /* ══ PROCESSING ══ */
    #processing {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,.5);
      align-items:center; justify-content:center;
      flex-direction:column; gap:12px;
      backdrop-filter:blur(3px); z-index:40;
    }
    #processing.active { display:flex; }
    .spinner {
      width:38px; height:38px;
      border:3px solid rgba(255,255,255,.15);
      border-top-color:var(--red);
      border-radius:50%; animation:spin .75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ══ GALERIE — plein écran par-dessus ══ */
    #view-gallery {
      position:absolute; inset:0;
      z-index:20;
      background:#0A0A0F;
      display:none;
      flex-direction:column;
      overflow:hidden;
    }
    #view-gallery.active { display:flex; }

    /* Header galerie (même hauteur que hdr caméra) */
    #gallery-hdr {
      position:absolute;
      top:0; left:0; right:0;
      z-index:5;
      padding:14px 18px 14px;
      padding-top: max(14px, env(safe-area-inset-top) + 8px);
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(10,10,15,.92);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    #gallery-hdr .logo { font-size:17px; font-weight:700; }

    #gallery-scroll {
      flex:1;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      /* Commence sous le header galerie */
      padding-top: max(58px, env(safe-area-inset-top) + 52px);
      padding-bottom: max(16px, env(safe-area-inset-bottom) + 8px);
      padding-left:12px; padding-right:12px;
    }
    #gallery-empty {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; color:rgba(255,255,255,.3);
      padding:80px 0;
    }
    .empty-icon { font-size:44px; }
    #gallery-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:6px;
    }
    .gitem {
      position:relative; aspect-ratio:9/16;
      border-radius:8px; overflow:hidden;
      cursor:pointer; background:#1a1a24;
    }
    .gitem img { width:100%; height:100%; object-fit:cover; display:block; }
    .gitem-meta {
      position:absolute; bottom:0; left:0; right:0;
      padding:5px 7px;
      background:linear-gradient(transparent,rgba(0,0,0,.85));
      font-size:9px; font-family:var(--mono);
      color:rgba(255,255,255,.85); line-height:1.5;
    }
    .gitem-del {
      position:absolute; top:5px; right:5px;
      width:24px; height:24px; border-radius:50%;
      background:rgba(0,0,0,.6); border:none;
      color:white; font-size:10px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }

    /* Lightbox */
    #lightbox {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.97); z-index:100;
      align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }
    #lightbox.open { display:flex; }
    #lb-img { max-width:100%; max-height:80dvh; object-fit:contain; border-radius:8px; }
    #lb-close {
      position:fixed; top:max(16px,env(safe-area-inset-top)+8px); right:18px;
      background:rgba(30,30,40,.9); border:none; color:white;
      width:34px; height:34px; border-radius:50%; font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:101;
    }
    #lb-share {
      background:var(--red); color:white; border:none;
      padding:12px 34px; border-radius:30px;
      font-size:14px; font-weight:600; cursor:pointer;
    }

    /* Toast */
    #toast {
      position:fixed;
      bottom:max(32px,env(safe-area-inset-bottom)+20px);
      left:50%; transform:translateX(-50%) translateY(14px);
      background:rgba(22,22,32,.96); color:var(--white);
      padding:10px 18px; border-radius:30px; font-size:13px;
      opacity:0; transition:opacity .3s,transform .3s;
      white-space:nowrap; z-index:200;
      border:1px solid rgba(255,255,255,.07);
      pointer-events:none; backdrop-filter:blur(10px);
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    #toast.ok   { border-color:rgba(74,222,128,.3); }
    #toast.err  { border-color:rgba(232,32,42,.4); }
  </style>
</head>
<body>
<div id="stage">

  <!-- Flux vidéo -->
  <video id="live-video" autoplay playsinline muted></video>

  <!-- Overlay annotation live (transparent) -->
  <canvas id="live-overlay"></canvas>

  <!-- Canvas photo capturée -->
  <canvas id="annotated"></canvas>

  <!-- Flash -->
  <div id="flash"></div>

  <!-- ══ HEADER ══ -->
  <div id="hdr">
    <div class="logo"><div class="logo-dot"></div>Geo<span>Snap</span></div>
    <div class="tab-group">
      <button class="tab active" data-view="camera">📷 Caméra</button>
      <button class="tab"        data-view="gallery">🖼 Galerie</button>
    </div>
  </div>
  <div id="gps-dot"></div>

  <!-- ══ BOTTOM ══ -->
  <div id="bottom">
    <button id="shutter-btn" aria-label="Prendre une photo"></button>
    <label id="cam-fallback" for="cameraInput">📷 Photographier</label>
    <input type="file" accept="image/*" capture="environment" id="cameraInput">
  </div>

  <!-- Processing -->
  <div id="processing"><div class="spinner"></div></div>

  <!-- ══ GALERIE ══ -->
  <div id="view-gallery">
    <div id="gallery-hdr">
      <div class="logo"><div class="logo-dot"></div>Geo<span>Snap</span></div>
      <div class="tab-group">
        <button class="tab"        data-view="camera">📷 Caméra</button>
        <button class="tab active" data-view="gallery">🖼 Galerie</button>
      </div>
    </div>
    <div id="gallery-scroll">
      <div id="gallery-empty">
        <div class="empty-icon">📂</div>
        <p style="font-size:14px">Aucune photo</p>
        <p style="font-size:12px;opacity:.6">Prenez votre première photo !</p>
      </div>
      <div id="gallery-grid" style="display:none"></div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-share">📤 Partager / Enregistrer</button>
</div>

<div id="toast"></div>

<script>
/* ── SERVICE WORKER ── */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

/* ── STATE ── */
const S = {
  lat:0, lon:0, gpsReady:false, city:'', address:'',
  stream:null,
};

/* ── DOM ── */
const video       = document.getElementById('live-video');
const liveOverlay = document.getElementById('live-overlay');
const lvo         = liveOverlay.getContext('2d');
const captureCanvas = document.getElementById('annotated');
const cctx        = captureCanvas.getContext('2d');
const shutterBtn  = document.getElementById('shutter-btn');
const camFallback = document.getElementById('cam-fallback');
const cameraInput = document.getElementById('cameraInput');
const gpsDot      = document.getElementById('gps-dot');
const processing  = document.getElementById('processing');
const flash       = document.getElementById('flash');

/* ── GPS ── */
function initGPS() {
  if (!navigator.geolocation) { gpsDot.className='error'; return; }
  navigator.geolocation.watchPosition(
    pos => {
      S.lat=pos.coords.latitude; S.lon=pos.coords.longitude; S.gpsReady=true;
      gpsDot.className='active';
      geocode(S.lat,S.lon).then(r=>{S.city=r.city;S.address=r.address;});
    },
    ()=>gpsDot.className='error',
    {enableHighAccuracy:true,maximumAge:15000,timeout:10000}
  );
}
initGPS();

/* ── LIVE OVERLAY — redessiné chaque seconde ── */
function resizeLiveOverlay() {
  liveOverlay.width  = window.innerWidth  * (window.devicePixelRatio||1);
  liveOverlay.height = window.innerHeight * (window.devicePixelRatio||1);
  liveOverlay.style.width  = window.innerWidth  + 'px';
  liveOverlay.style.height = window.innerHeight + 'px';
}
resizeLiveOverlay();
window.addEventListener('resize', resizeLiveOverlay);

let overlayTimer = null;
function startLiveOverlay() {
  if (overlayTimer) return;
  drawLiveOverlay();
  overlayTimer = setInterval(drawLiveOverlay, 1000);
}
function stopLiveOverlay() {
  if (overlayTimer) { clearInterval(overlayTimer); overlayTimer=null; }
  lvo.clearRect(0,0,liveOverlay.width,liveOverlay.height);
}

function drawLiveOverlay() {
  const W = liveOverlay.width, H = liveOverlay.height;
  lvo.clearRect(0,0,W,H);
  drawAnnotText(lvo, W, H, new Date(), false);
}

/* ── CAMERA ── */
async function startCamera() {
  if (S.stream) { S.stream.getTracks().forEach(t=>t.stop()); S.stream=null; }
  stopLiveOverlay();
  try {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:2560}},audio:false
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1920},height:{ideal:2560}},audio:false
      });
    }
    S.stream = stream;
    video.srcObject = stream;
    await video.play();
    video.style.display = 'block';
    captureCanvas.style.display = 'none';
    shutterBtn.style.display = 'flex';
    camFallback.classList.remove('show');
    startLiveOverlay();
  } catch {
    video.style.display = 'none';
    camFallback.classList.add('show');
    shutterBtn.style.display = 'none';
    startLiveOverlay(); // overlay sur fond noir quand même
  }
}
startCamera();

/* ── CAPTURE ── */
shutterBtn.addEventListener('click', doCapture);
cameraInput.addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const url = URL.createObjectURL(file);
  const img = await loadImg(url); URL.revokeObjectURL(url);
  const off = document.createElement('canvas');
  off.width=img.naturalWidth; off.height=img.naturalHeight;
  off.getContext('2d').drawImage(img,0,0);
  cameraInput.value='';
  await captureAndSave(off);
});

async function doCapture() {
  // Flash visuel
  flash.classList.add('go');
  setTimeout(()=>flash.classList.remove('go'),120);

  const W = video.videoWidth||1080, H = video.videoHeight||1920;
  const off = document.createElement('canvas');
  off.width=W; off.height=H;
  off.getContext('2d').drawImage(video,0,0,W,H);
  await captureAndSave(off);
}

async function captureAndSave(src) {
  processing.classList.add('active');
  try {
    // 1. Préparer canvas de capture (plein écran)
    const sw = window.innerWidth  * (window.devicePixelRatio||1);
    const sh = window.innerHeight * (window.devicePixelRatio||1);
    captureCanvas.width  = sw; captureCanvas.height = sh;
    captureCanvas.style.width  = window.innerWidth+'px';
    captureCanvas.style.height = window.innerHeight+'px';

    // Crop centré
    const cr = sw/sh, sr = src.width/src.height;
    let sx=0,sy=0,ssw=src.width,ssh=src.height;
    if(sr>cr){ssw=src.height*cr;sx=(src.width-ssw)/2;}
    else     {ssh=src.width/cr; sy=(src.height-ssh)/2;}
    cctx.drawImage(src,sx,sy,ssw,ssh,0,0,sw,sh);

    // 2. Carte GPS
    const mapImg = S.gpsReady ? await getMapTile(S.lat,S.lon) : null;

    // 3. Annotations sur la capture
    drawAnnotText(cctx, sw, sh, new Date(), true, mapImg);

    // 4. Blob → save silencieux
    const blob = await canvasToBlob(captureCanvas);
    await saveToGallery(blob, new Date());

    showToast('✅ Photo enregistrée','ok');
  } catch(e) {
    showToast('❌ Erreur','err');
    console.error(e);
  }
  processing.classList.remove('active');
  // On reste en mode caméra live — pas d'affichage de la capture
}

/* ── DRAW ANNOTATIONS ── */
// ctx, W, H : dimensions du canvas en pixels physiques
// forCapture : true = rendu haute qualité + carte ; false = live overlay léger
function drawAnnotText(ctx, W, H, now, forCapture, mapImg) {
  const dpr = window.devicePixelRatio||1;

  // Dégradé bas — plus bas, plus discret
  const grad = ctx.createLinearGradient(0, H*0.72, 0, H);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,0,0,0.78)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  const pad   = W * 0.042;
  // Bouton shutter ~82px + safe area ~ 46px → réserver ~128px en bas
  const reserveBottom = forCapture ? 0 : 128 * dpr;
  const baseY = H - pad*0.8 - reserveBottom;

  function sh(on){
    if(on){ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=6*dpr;ctx.shadowOffsetX=ctx.shadowOffsetY=dpr;}
    else  {ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=ctx.shadowOffsetY=0;}
  }

  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.textBaseline='bottom';

  // Coordonnées
  sh(true);
  ctx.font=`${H*0.014}px "SF Mono","Fira Code",monospace`;
  const cStr = S.gpsReady
    ? `${S.lat.toFixed(6)}°N   ${S.lon.toFixed(6)}°E`
    : 'Coordonnées indisponibles';
  ctx.fillText(cStr, pad, baseY);

  // Adresse
  const aY = baseY - H*0.022;
  ctx.font=`${H*0.016}px "SF Mono","Fira Code",monospace`;
  const maxAddrW = W - pad*2 - W*(forCapture&&mapImg ? 0.26 : 0.04);
  ctx.fillText(trunc(ctx, S.address||S.city||'Adresse indisponible', maxAddrW), pad, aY);

  // Heure + secondes
  const tStr = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const tY   = aY - H*0.012;
  ctx.font=`700 ${H*0.052}px "Arial Narrow",Arial,sans-serif`;
  ctx.fillText(tStr, pad, tY);

  // Ligne rouge
  const tw   = ctx.measureText(tStr).width;
  const lineX= pad + tw + W*0.022;
  sh(false);
  ctx.strokeStyle='#E8202A'; ctx.lineWidth=W*0.004; ctx.lineCap='round';
  const lineTop = tY - H*0.044;
  ctx.beginPath(); ctx.moveTo(lineX,tY); ctx.lineTo(lineX,lineTop); ctx.stroke();

  // Date & Jour
  sh(true);
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.textBaseline='top';
  const dX   = lineX + W*0.018;
  const dStr = now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  let   dayS = now.toLocaleDateString('fr-FR',{weekday:'short'});
  dayS=dayS[0].toUpperCase()+dayS.slice(1);
  ctx.font=`${H*0.017}px -apple-system,sans-serif`;
  ctx.fillText(dStr,dX,lineTop);
  ctx.fillText(dayS,dX,lineTop+H*0.022);

  // Miniature carte (capture uniquement)
  if (forCapture && mapImg) {
    const mS = W*0.19;
    const mX = W - pad - mS;
    const mY = baseY - mS - H*0.004;
    sh(false);
    ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=8*dpr;
    ctx.fillStyle='white';
    rrect(ctx,mX-2,mY-2,mS+4,mS+4,mS*.07+2); ctx.fill();
    sh(false);
    ctx.save(); rrect(ctx,mX,mY,mS,mS,mS*.07); ctx.clip();
    ctx.drawImage(mapImg,mX,mY,mS,mS); ctx.restore();
    ctx.fillStyle='#E8202A'; ctx.strokeStyle='white'; ctx.lineWidth=2*dpr;
    ctx.beginPath(); ctx.arc(mX+mS/2,mY+mS/2,mS*.08,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }
}

/* ── HELPERS ── */
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function trunc(ctx,text,max){
  if(ctx.measureText(text).width<=max) return text;
  let t=text;
  while(t.length>4&&ctx.measureText(t+'…').width>max) t=t.slice(0,-1);
  return t+'…';
}
function loadImg(src){
  return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});
}
function canvasToBlob(c){ return new Promise(res=>c.toBlob(res,'image/jpeg',.95)); }

/* ── MAP TILE ── */
function getMapTile(lat,lon,z=16){
  return new Promise(resolve=>{
    const n=2**z,x=Math.floor(n*(lon+180)/360);
    const lr=lat*Math.PI/180;
    const y=Math.floor(n*(1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2);
    const img=new Image(); img.crossOrigin='anonymous';
    const t=setTimeout(()=>resolve(null),5000);
    img.onload=()=>{clearTimeout(t);resolve(img);};
    img.onerror=()=>{clearTimeout(t);resolve(null);};
    img.src=`https://a.tile.openstreetmap.org/${z}/${x}/${y}.png`;
  });
}

/* ── GEOCODING ── */
async function geocode(lat,lon){
  try{
    const c=new AbortController(); setTimeout(()=>c.abort(),6000);
    const r=await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`,
      {headers:{'Accept-Language':'fr','User-Agent':'GeoSnapPWA/4.0'},signal:c.signal}
    );
    if(!r.ok) throw 0;
    const d=await r.json(),a=d.address;
    const city   = a.city||a.town||a.village||a.municipality||'';
    const road   = a.road||a.pedestrian||a.footway||'';
    const num    = a.house_number||'';
    const post   = a.postcode||'';
    const street = num&&road?`${num} ${road}`:road;
    const address= [street,post&&city?`${post} ${city}`:city].filter(Boolean).join(', ')
                   ||d.display_name?.split(',').slice(0,3).join(',');
    return {city,address:address||'Adresse inconnue'};
  }catch{return{city:'',address:'Adresse indisponible'};}
}

/* ── INDEXEDDB ── */
const DB='GeoSnapDB4',VER=1,ST='photos';
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const q=indexedDB.open(DB,VER);
    q.onupgradeneeded=e=>e.target.result.createObjectStore(ST,{keyPath:'id',autoIncrement:true});
    q.onsuccess=e=>{db=e.target.result;res(db);};
    q.onerror=e=>rej(e.target.error);
  });
}
async function saveToGallery(blob,ts){
  await openDB();
  const ab=await blob.arrayBuffer();
  return new Promise((res,rej)=>{
    const tx=db.transaction(ST,'readwrite');
    tx.objectStore(ST).add({data:ab,type:blob.type,ts:ts.getTime(),city:S.address||S.city,lat:S.lat,lon:S.lon});
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}
async function loadGallery(){
  await openDB();
  return new Promise((res,rej)=>{
    const q=db.transaction(ST,'readonly').objectStore(ST).getAll();
    q.onsuccess=e=>res(e.target.result.reverse());
    q.onerror=e=>rej(e.target.error);
  });
}
async function deletePhoto(id){
  await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(ST,'readwrite');
    tx.objectStore(ST).delete(id);
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}

/* ── TABS ── */
// Sync les deux groupes de tabs (header caméra + header galerie)
function setTab(view){
  document.querySelectorAll('.tab').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
  const gallery = document.getElementById('view-gallery');
  if(view==='gallery'){
    gallery.classList.add('active');
    renderGallery();
  } else {
    gallery.classList.remove('active');
  }
}
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>setTab(btn.dataset.view));
});

/* ── GALERIE RENDER ── */
async function renderGallery(){
  const items=await loadGallery();
  const grid=document.getElementById('gallery-grid');
  const empty=document.getElementById('gallery-empty');
  grid.innerHTML='';
  if(!items.length){empty.style.display='flex';grid.style.display='none';return;}
  empty.style.display='none'; grid.style.display='grid';
  items.forEach(item=>{
    const blob=new Blob([item.data],{type:item.type});
    const url=URL.createObjectURL(blob);
    const d=new Date(item.ts);
    const label=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
               +' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const div=document.createElement('div');
    div.className='gitem';
    div.innerHTML=`<img src="${url}" loading="lazy"><div class="gitem-meta">${label}${item.city?'<br>'+item.city:''}</div><button class="gitem-del">✕</button>`;
    div.querySelector('img').onclick=()=>openLightbox(url,blob,item);
    div.querySelector('.gitem-del').onclick=async e=>{
      e.stopPropagation();
      await deletePhoto(item.id);
      URL.revokeObjectURL(url);
      renderGallery();
      showToast('🗑 Supprimée');
    };
    grid.appendChild(div);
  });
}

/* ── LIGHTBOX ── */
let lbBlob=null,lbTs=null;
function openLightbox(url,blob,item){
  document.getElementById('lb-img').src=url;
  lbBlob=blob; lbTs=new Date(item.ts);
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lb-close').onclick=()=>{
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src='';
};
document.getElementById('lb-share').onclick=()=>{
  if(lbBlob&&lbTs) shareBlob(lbBlob,lbTs);
};

async function shareBlob(blob,ts){
  const name=`GeoSnap_${ts.toISOString().replace(/[:.]/g,'-').slice(0,19)}.jpg`;
  const file=new File([blob],name,{type:'image/jpeg'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:'GeoSnap'});showToast('✅ Partagé','ok');return;}
    catch(e){if(e.name==='AbortError') return;}
  }
  const url=URL.createObjectURL(blob);
  const a=Object.assign(document.createElement('a'),{href:url,download:name});
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast('⬇️ Téléchargée','ok');
}

/* ── TOAST ── */
let toastT;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+(type||'');
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='',2800);
}
