<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoSnap">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <title>GeoSnap</title>
  <style>
    :root {
      --red:  #E8202A;
      --white:#F0F0F5;
      --mono: "SF Mono","Fira Code","Courier New",monospace;
      --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#000;
      font-family:var(--sans);
      color:var(--white);
    }

    /* ══ STAGE — vrai plein écran ══ */
    #stage {
      position:fixed;
      top:0; left:0; right:0; bottom:0;
    }

    /* Vidéo couvre tout */
    #live-video {
      position:absolute;
      inset:0; width:100%; height:100%;
      object-fit:cover;
      display:block;
    }

    /* Canvas live-annotation : par-dessus la vidéo, transparent, pointer-events none */
    #live-overlay {
      position:absolute;
      inset:0; width:100%; height:100%;
      pointer-events:none;
      display:block;
    }

    /* Canvas final (capture) — même taille */
    #annotated {
      position:absolute;
      inset:0; width:100%; height:100%;
      object-fit:cover;
      display:none;
    }

    /* ══ HEADER flottant ══ */
    #hdr {
      position:absolute;
      top:0; left:0; right:0;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px 14px;
      padding-top: max(14px, env(safe-area-inset-top) + 8px);
      background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,transparent 100%);
    }
    .logo {
      display:flex; align-items:center; gap:8px;
      font-size:17px; font-weight:700; letter-spacing:-.3px;
    }
    .logo-dot {
      width:8px; height:8px; background:var(--red);
      border-radius:50%; box-shadow:0 0 6px var(--red);
    }
    .logo span { color:var(--red); }
    .tab-group {
      display:flex; gap:3px;
      background:rgba(0,0,0,.50);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-radius:22px; padding:3px;
      border:1px solid rgba(255,255,255,.12);
    }
    .tab {
      padding:7px 15px;
      font-size:13px; font-weight:600;
      border:none; border-radius:18px;
      cursor:pointer; color:rgba(255,255,255,.55);
      background:transparent;
      transition:background .2s,color .2s;
      -webkit-tap-highlight-color:transparent;
    }
    .tab.active { background:var(--red); color:white; }

    /* GPS dot minuscule */
    #gps-dot {
      position:absolute;
      top: max(18px, env(safe-area-inset-top) + 10px);
      left:50%; transform:translateX(-50%);
      width:6px; height:6px;
      border-radius:50%; background:#444;
      transition:background .4s,box-shadow .4s;
      z-index:31; pointer-events:none;
    }
    #gps-dot.active { background:#4ade80; box-shadow:0 0 5px #4ade80; }
    #gps-dot.error  { background:var(--red); }

    /* ══ BOTTOM flottant ══ */
    #bottom {
      position:absolute;
      bottom:0; left:0; right:0;
      z-index:30;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-bottom: max(30px, env(safe-area-inset-bottom) + 20px);
      background:linear-gradient(to top,rgba(0,0,0,.45) 0%,transparent 100%);
      pointer-events:none;
    }
    #bottom > * { pointer-events:auto; }

    /* Bouton déclencheur */
    #shutter-btn {
      width:70px; height:70px; border-radius:50%;
      background:transparent;
      border:3px solid rgba(255,255,255,.85);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      display:flex; align-items:center; justify-content:center;
      transition:transform .1s;
      position:relative;
      margin-top:14px;
    }
    #shutter-btn::after {
      content:'';
      width:54px; height:54px; border-radius:50%;
      background:white; position:absolute;
      transition:transform .08s, background .08s;
    }
    #shutter-btn:active { transform:scale(.91); }
    #shutter-btn:active::after { background:#bbb; }

    /* Flash feedback */
    #flash {
      position:absolute; inset:0;
      background:white; opacity:0;
      pointer-events:none; z-index:50;
      transition:opacity .08s;
    }
    #flash.go { opacity:.7; }

    /* Fallback si pas getUserMedia */
    label#cam-fallback {
      display:none; margin-top:14px;
      padding:13px 28px; background:var(--red);
      color:white; font-size:15px; font-weight:600;
      border-radius:30px; cursor:pointer;
    }
    label#cam-fallback.show { display:block; }
    input[type="file"] { display:none; }

    /* ══ PROCESSING ══ */
    #processing {
      display:none; position:absolute; inset:0;
      background:rgba(0,0,0,.5);
      align-items:center; justify-content:center;
      flex-direction:column; gap:12px;
      backdrop-filter:blur(3px); z-index:40;
    }
    #processing.active { display:flex; }
    .spinner {
      width:38px; height:38px;
      border:3px solid rgba(255,255,255,.15);
      border-top-color:var(--red);
      border-radius:50%; animation:spin .75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ══ GALERIE — plein écran par-dessus ══ */
    #view-gallery {
      position:absolute; inset:0;
      z-index:20;
      background:#0A0A0F;
      display:none;
      flex-direction:column;
      overflow:hidden;
    }
    #view-gallery.active { display:flex; }

    /* Header galerie */
    #gallery-hdr {
      position:absolute;
      top:0; left:0; right:0;
      z-index:5;
      padding:14px 18px 14px;
      padding-top: max(14px, env(safe-area-inset-top) + 8px);
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(10,10,15,.92);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    #gallery-hdr .logo { font-size:17px; font-weight:700; }

    #gallery-scroll {
      flex:1;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding-top: max(58px, env(safe-area-inset-top) + 52px);
      padding-bottom: max(16px, env(safe-area-inset-bottom) + 8px);
      padding-left:10px; padding-right:10px;
    }
    #gallery-empty {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; color:rgba(255,255,255,.3);
      padding:80px 0;
    }
    .empty-icon { font-size:44px; }
    #gallery-grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
    }
    .gitem {
      position:relative; aspect-ratio:9/16;
      border-radius:8px; overflow:hidden;
      cursor:pointer; background:#1a1a24;
    }
    .gitem img { width:100%; height:100%; object-fit:cover; display:block; }
    .gitem-meta {
      position:absolute; bottom:0; left:0; right:0;
      padding:5px 7px;
      background:linear-gradient(transparent,rgba(0,0,0,.85));
      font-size:9px; font-family:"Barlow Condensed","SF Mono",monospace;
      color:rgba(255,255,255,.85); line-height:1.5;
    }
    .gitem-del {
      position:absolute; top:5px; right:5px;
      width:24px; height:24px; border-radius:50%;
      background:rgba(0,0,0,.6); border:none;
      color:white; font-size:10px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }

    /* ══ SWIPER plein écran ══ */
    #swiper {
      display:none; position:fixed; inset:0;
      background:#000; z-index:100;
      touch-action:none; overflow:hidden;
    }
    #swiper.open { display:block; }

    #swiper-track {
      display:flex; height:100%;
      transition:transform .28s cubic-bezier(.4,0,.2,1);
      will-change:transform;
    }
    .swiper-slide {
      flex:0 0 100%; width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      background:#000;
      /* Padding pour ne pas être sous la notch ni les contrôles bas */
      padding-top: max(50px, env(safe-area-inset-top) + 50px);
      padding-bottom: max(40px, env(safe-area-inset-bottom) + 40px);
    }
    .swiper-slide img {
      width:100%; height:100%; object-fit:contain; display:block;
      border-radius:8px;
      user-select:none; -webkit-user-drag:none;
    }

    /* Contrôles swiper */
    #swiper-back {
      position:fixed;
      top: max(16px, env(safe-area-inset-top) + 10px);
      left: 16px;
      background:rgba(20,20,28,.92);
      border: 1px solid rgba(255,255,255,.15);
      color:white;
      height:38px; padding:0 16px 0 10px;
      border-radius:19px; font-size:14px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; gap:5px;
      z-index:110;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      -webkit-tap-highlight-color:transparent;
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
    }
    #swiper-back:active { opacity:.75; }

    #swiper-close { display:none; }

    #swiper-share {
      position:fixed;
      bottom: max(28px, env(safe-area-inset-bottom) + 16px);
      left: calc(50% - 52px);
      width:46px; height:46px; border-radius:50%;
      background:rgba(232,32,42,.92); color:white; border:none;
      font-size:20px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(8px); z-index:110;
      -webkit-tap-highlight-color:transparent;
      box-shadow: 0 2px 12px rgba(232,32,42,.4);
    }
    #swiper-del {
      position:fixed;
      bottom: max(28px, env(safe-area-inset-bottom) + 16px);
      left: calc(50% + 6px);
      width:46px; height:46px; border-radius:50%; font-size:20px;
      background:rgba(20,20,28,.88); border:none; color:rgba(255,255,255,.75);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      z-index:110; backdrop-filter:blur(8px);
      -webkit-tap-highlight-color:transparent;
    }
    #swiper-index {
      position:fixed;
      top: max(16px, env(safe-area-inset-top) + 10px);
      left:50%; transform:translateX(-50%);
      background:rgba(20,20,28,.75); color:rgba(255,255,255,.7);
      font-size:12px; padding:5px 14px; border-radius:20px;
      z-index:110; backdrop-filter:blur(8px); pointer-events:none;
    }

    /* Toast */
    #toast {
      position:fixed;
      bottom:max(32px,env(safe-area-inset-bottom)+20px);
      left:50%; transform:translateX(-50%) translateY(14px);
      background:rgba(22,22,32,.96); color:var(--white);
      padding:10px 18px; border-radius:30px; font-size:13px;
      opacity:0; transition:opacity .3s,transform .3s;
      white-space:nowrap; z-index:200;
      border:1px solid rgba(255,255,255,.07);
      pointer-events:none; backdrop-filter:blur(10px);
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    #toast.ok   { border-color:rgba(74,222,128,.3); }
    #toast.err  { border-color:rgba(232,32,42,.4); }
  </style>
</head>
<body>
<div id="stage">

  <!-- Flux vidéo -->
  <video id="live-video" autoplay playsinline muted></video>

  <!-- Overlay annotation live (transparent) -->
  <canvas id="live-overlay"></canvas>

  <!-- Canvas photo capturée -->
  <canvas id="annotated"></canvas>

  <!-- Flash -->
  <div id="flash"></div>

  <!-- ══ HEADER ══ -->
  <div id="hdr">
    <div class="logo"><div class="logo-dot"></div>Geo<span>Snap</span></div>
    <div class="tab-group">
      <button class="tab active" data-view="camera">📷 Caméra</button>
      <button class="tab"        data-view="gallery">🖼 Galerie</button>
    </div>
  </div>
  <div id="gps-dot"></div>

  <!-- ══ BOTTOM ══ -->
  <div id="bottom">
    <button id="shutter-btn" aria-label="Prendre une photo"></button>
    <label id="cam-fallback" for="cameraInput">📷 Photographier</label>
    <input type="file" accept="image/*" capture="environment" id="cameraInput">
  </div>

  <!-- Processing -->
  <div id="processing"><div class="spinner"></div></div>

  <!-- ══ GALERIE ══ -->
  <div id="view-gallery">
    <div id="gallery-hdr">
      <div class="logo"><div class="logo-dot"></div>Geo<span>Snap</span></div>
      <div class="tab-group">
        <button class="tab"        data-view="camera">📷 Caméra</button>
        <button class="tab active" data-view="gallery">🖼 Galerie</button>
      </div>
    </div>
    <div id="gallery-scroll">
      <div id="gallery-empty">
        <div class="empty-icon">📂</div>
        <p style="font-size:14px">Aucune photo</p>
        <p style="font-size:12px;opacity:.6">Prenez votre première photo !</p>
      </div>
      <div id="gallery-grid" style="display:none"></div>
    </div>
  </div>

</div>

<!-- ══ SWIPER plein écran ══ -->
<div id="swiper">
  <div id="swiper-track"></div>
  <button id="swiper-back">‹ Galerie</button>
  <button id="swiper-close" style="display:none">✕</button>
  <div id="swiper-index">1 / 1</div>
  <button id="swiper-share" title="Partager">📤</button>
  <button id="swiper-del" title="Supprimer">🗑</button>
</div>

<div id="toast"></div>

<script>
/* ── SERVICE WORKER ── */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

/* ── STATE ── */
const S = {
  lat:0, lon:0, gpsReady:false, city:'', address:'',
  stream:null, mapTile:null,
};

/* ── DOM ── */
const video       = document.getElementById('live-video');
const liveOverlay = document.getElementById('live-overlay');
const lvo         = liveOverlay.getContext('2d');
const captureCanvas = document.getElementById('annotated');
const cctx        = captureCanvas.getContext('2d');
const shutterBtn  = document.getElementById('shutter-btn');
const camFallback = document.getElementById('cam-fallback');
const cameraInput = document.getElementById('cameraInput');
const gpsDot      = document.getElementById('gps-dot');
const processing  = document.getElementById('processing');
const flash       = document.getElementById('flash');

/* ── GPS ── */
let gpsRefreshTimer = null;

async function refreshGeoAndTile() {
  if (!S.gpsReady) return;
  const r = await geocode(S.lat, S.lon);
  S.city = r.city; S.address = r.address;
  const t = await getMapTile(S.lat, S.lon);
  if (t) S.mapTile = t;
}

function initGPS() {
  if (!navigator.geolocation) { gpsDot.className='error'; return; }
  navigator.geolocation.watchPosition(
    pos => {
      S.lat=pos.coords.latitude; S.lon=pos.coords.longitude; S.gpsReady=true;
      gpsDot.className='active';
      geocode(S.lat,S.lon).then(r=>{S.city=r.city;S.address=r.address;});
      getMapTile(S.lat,S.lon).then(t=>{ if(t) S.mapTile=t; });
    },
    ()=>gpsDot.className='error',
    {enableHighAccuracy:true,maximumAge:15000,timeout:10000}
  );
  // Refresh adresse + tuile toutes les 30s
  if (gpsRefreshTimer) clearInterval(gpsRefreshTimer);
  gpsRefreshTimer = setInterval(refreshGeoAndTile, 30000);
}
initGPS();

/* ── LIVE OVERLAY — redessiné chaque seconde ── */
function resizeLiveOverlay() {
  liveOverlay.width  = window.innerWidth  * (window.devicePixelRatio||1);
  liveOverlay.height = window.innerHeight * (window.devicePixelRatio||1);
  liveOverlay.style.width  = window.innerWidth  + 'px';
  liveOverlay.style.height = window.innerHeight + 'px';
}
resizeLiveOverlay();
window.addEventListener('resize', resizeLiveOverlay);

let overlayTimer = null;
function startLiveOverlay() {
  if (overlayTimer) return;
  drawLiveOverlay();
  overlayTimer = setInterval(drawLiveOverlay, 1000);
}
function stopLiveOverlay() {
  if (overlayTimer) { clearInterval(overlayTimer); overlayTimer=null; }
  lvo.clearRect(0,0,liveOverlay.width,liveOverlay.height);
}

function drawLiveOverlay() {
  const W = liveOverlay.width, H = liveOverlay.height;
  lvo.clearRect(0,0,W,H);
  drawAnnotText(lvo, W, H, new Date(), false, S.mapTile);
}

/* ── CAMERA ── */
async function startCamera() {
  if (S.stream) { S.stream.getTracks().forEach(t=>t.stop()); S.stream=null; }
  stopLiveOverlay();
  try {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:2560}},audio:false
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1920},height:{ideal:2560}},audio:false
      });
    }
    S.stream = stream;
    video.srcObject = stream;
    await video.play();
    video.style.display = 'block';
    captureCanvas.style.display = 'none';
    shutterBtn.style.display = 'flex';
    camFallback.classList.remove('show');
    startLiveOverlay();
  } catch {
    video.style.display = 'none';
    camFallback.classList.add('show');
    shutterBtn.style.display = 'none';
    startLiveOverlay(); // overlay sur fond noir quand même
  }
}
startCamera();

/* ── CAPTURE ── */
shutterBtn.addEventListener('click', doCapture);
cameraInput.addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const url = URL.createObjectURL(file);
  const img = await loadImg(url); URL.revokeObjectURL(url);
  const off = document.createElement('canvas');
  off.width=img.naturalWidth; off.height=img.naturalHeight;
  off.getContext('2d').drawImage(img,0,0);
  cameraInput.value='';
  await captureAndSave(off);
});

async function doCapture() {
  // Flash visuel
  flash.classList.add('go');
  setTimeout(()=>flash.classList.remove('go'),120);

  const W = video.videoWidth||1080, H = video.videoHeight||1920;
  const off = document.createElement('canvas');
  off.width=W; off.height=H;
  off.getContext('2d').drawImage(video,0,0,W,H);
  await captureAndSave(off);
}

async function captureAndSave(src) {
  processing.classList.add('active');
  try {
    // 1. Préparer canvas de capture (plein écran)
    const sw = window.innerWidth  * (window.devicePixelRatio||1);
    const sh = window.innerHeight * (window.devicePixelRatio||1);
    captureCanvas.width  = sw; captureCanvas.height = sh;
    captureCanvas.style.width  = window.innerWidth+'px';
    captureCanvas.style.height = window.innerHeight+'px';

    // Crop centré
    const cr = sw/sh, sr = src.width/src.height;
    let sx=0,sy=0,ssw=src.width,ssh=src.height;
    if(sr>cr){ssw=src.height*cr;sx=(src.width-ssw)/2;}
    else     {ssh=src.width/cr; sy=(src.height-ssh)/2;}
    cctx.drawImage(src,sx,sy,ssw,ssh,0,0,sw,sh);

    // 2. Carte GPS — refresh position/adresse + tuile à la capture
    await refreshGeoAndTile();
    const mapImg = S.mapTile || (S.gpsReady ? await getMapTile(S.lat,S.lon) : null);
    if (mapImg && !S.mapTile) S.mapTile = mapImg;

    // 3. Annotations sur la capture
    drawAnnotText(cctx, sw, sh, new Date(), true, mapImg);

    // 4. Blob → save silencieux
    const blob = await canvasToBlob(captureCanvas);
    await saveToGallery(blob, new Date());

    showToast('✅ Photo enregistrée','ok');
  } catch(e) {
    showToast('❌ Erreur','err');
    console.error(e);
  }
  processing.classList.remove('active');
  // On reste en mode caméra live — pas d'affichage de la capture
}

/* ── DRAW ANNOTATIONS ── */
function drawAnnotText(ctx, W, H, now, forCapture, mapImg) {
  const dpr = window.devicePixelRatio||1;

  // Dégradé bas plus étendu pour couvrir toutes les lignes écartées
  const grad = ctx.createLinearGradient(0, H*0.55, 0, H);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,0,0,0.82)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  const pad  = W * 0.042;
  // Réserve bottom pour le shutter uniquement en live — plus bas
  const reserveBottom = forCapture ? pad*0.5 : (110 + Math.max(38,28)) * dpr;
  const baseY = H - reserveBottom;

  // Espacement vertical entre lignes
  const lineGap = H * 0.028; // espace entre chaque ligne d'annotation

  function sh(on){
    if(on){ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=5*dpr;ctx.shadowOffsetX=ctx.shadowOffsetY=.8*dpr;}
    else  {ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=ctx.shadowOffsetY=0;}
  }

  // Police condensée Barlow Condensed pour toutes les lignes texte
  const fontCond = '"Barlow Condensed",Arial Narrow,sans-serif';

  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.textBaseline='bottom';

  // ── L1 : Coordonnées (ligne la plus basse) ──
  sh(true);
  ctx.font=`400 ${H*0.013}px ${fontCond}`;
  ctx.letterSpacing = '0.04em';
  const cStr = S.gpsReady
    ? `${S.lat.toFixed(5)}°N  ${S.lon.toFixed(5)}°E`
    : 'Coordonnées indisponibles';
  const y1 = baseY;
  ctx.fillText(cStr, pad, y1);
  ctx.letterSpacing = '0';

  // ── L2 : Adresse ──
  const y2 = y1 - lineGap;
  const mapReserveW = mapImg ? W*0.25 : 0;
  const maxAddrW = W - pad*2 - mapReserveW;
  ctx.font=`400 ${H*0.016}px ${fontCond}`;
  ctx.fillText(trunc(ctx, S.address||S.city||'Adresse indisponible', maxAddrW), pad, y2);

  // ── L3 : Heure (grande, sans secondes) ──
  const tStr = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const y3   = y2 - lineGap;
  ctx.font=`700 ${H*0.058}px ${fontCond}`;
  ctx.fillText(tStr, pad, y3);

  // ── Ligne rouge verticale ──
  const tw    = ctx.measureText(tStr).width;
  const lineX = pad + tw + W*0.022;
  sh(false);
  ctx.strokeStyle='#E8202A'; ctx.lineWidth=W*0.004; ctx.lineCap='round';
  const lineTopY = y3 - H*0.048;
  const lineBot  = y3;
  ctx.beginPath(); ctx.moveTo(lineX,lineBot); ctx.lineTo(lineX,lineTopY); ctx.stroke();

  // ── Date & Jour (à droite de la ligne rouge) ──
  sh(true);
  ctx.fillStyle='rgba(255,255,255,.88)'; ctx.textBaseline='top';
  const dX = lineX + W*0.018;
  const dStr = now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  let dayS   = now.toLocaleDateString('fr-FR',{weekday:'short'});
  dayS = dayS[0].toUpperCase()+dayS.slice(1);
  ctx.font=`600 ${H*0.018}px ${fontCond}`;
  ctx.fillText(dStr, dX, lineTopY);
  ctx.fillText(dayS, dX, lineTopY + H*0.024);

  // ── Miniature carte (live ET capture) ──
  if (mapImg) {
    const mS = W * 0.20;
    const mX = W - pad - mS;
    const mY = y1 - mS;
    sh(false);
    ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=8*dpr;
    ctx.fillStyle='white';
    rrect(ctx, mX-2, mY-2, mS+4, mS+4, mS*.07+2); ctx.fill();
    sh(false);
    ctx.save(); rrect(ctx, mX, mY, mS, mS, mS*.07); ctx.clip();
    ctx.drawImage(mapImg, mX, mY, mS, mS); ctx.restore();
    // Le point GPS est déjà gravé dans mapImg par getMapTile()
  }
}

/* ── HELPERS ── */
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function trunc(ctx,text,max){
  if(ctx.measureText(text).width<=max) return text;
  let t=text;
  while(t.length>4&&ctx.measureText(t+'…').width>max) t=t.slice(0,-1);
  return t+'…';
}
function loadImg(src){
  return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});
}
function canvasToBlob(c){ return new Promise(res=>c.toBlob(res,'image/jpeg',.95)); }

/* ── MAP TILE — position exacte du point GPS dans la tuile ── */
function getMapTile(lat, lon, z = 17) {
  return new Promise(resolve => {
    const n   = 2 ** z;
    // Coordonnées tuile exactes (avec fraction)
    const xF  = n * (lon + 180) / 360;
    const lr  = lat * Math.PI / 180;
    const yF  = n * (1 - Math.log(Math.tan(lr) + 1 / Math.cos(lr)) / Math.PI) / 2;
    const tx  = Math.floor(xF);
    const ty  = Math.floor(yF);
    // Fraction du point dans la tuile [0..1]
    const fx  = xF - tx;
    const fy  = yF - ty;

    const TILE = 256; // taille d'une tuile OSM en px
    // On charge une grille 3×3 centrée sur la tuile du point
    const offsets = [-1, 0, 1];
    const imgs = [];
    let loaded = 0;
    const total = 9;

    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        const ix = ((tx + dx) % n + n) % n;
        const iy = Math.max(0, Math.min(n - 1, ty + dy));
        img.src = `https://a.tile.openstreetmap.org/${z}/${ix}/${iy}.png`;
        imgs.push({ img, dx, dy });
        const onDone = () => { if (++loaded === total) compose(); };
        img.onload  = onDone;
        img.onerror = onDone;
      }
    }

    const timer = setTimeout(() => resolve(null), 6000);

    function compose() {
      clearTimeout(timer);
      const size = TILE * 3;
      const off  = document.createElement('canvas');
      off.width  = size; off.height = size;
      const c    = off.getContext('2d');

      // Dessiner les 9 tuiles
      imgs.forEach(({ img, dx, dy }) => {
        c.drawImage(img, (dx + 1) * TILE, (dy + 1) * TILE, TILE, TILE);
      });

      // Position exacte du point dans la grille 3×3 (en px)
      const px = (1 + fx) * TILE;
      const py = (1 + fy) * TILE;

      // Recadrer : extraire une fenêtre centrée sur le point (taille = TILE*1.5)
      const crop = TILE * 1.5;
      const cropX = Math.round(px - crop / 2);
      const cropY = Math.round(py - crop / 2);

      const out  = document.createElement('canvas');
      out.width  = crop; out.height = crop;
      const oc   = out.getContext('2d');
      oc.drawImage(off, cropX, cropY, crop, crop, 0, 0, crop, crop);

      // Point GPS — exactement au centre du canvas de sortie
      const cx = crop / 2, cy = crop / 2, r = crop * 0.06;
      // Ombre
      oc.shadowColor = 'rgba(0,0,0,.5)'; oc.shadowBlur = 4;
      oc.fillStyle   = '#E8202A';
      oc.strokeStyle = 'white';
      oc.lineWidth   = Math.max(2, crop * 0.012);
      oc.beginPath(); oc.arc(cx, cy, r, 0, Math.PI * 2); oc.fill(); oc.stroke();
      // Petite croix blanche au centre
      oc.shadowColor = 'transparent';
      oc.strokeStyle = 'white'; oc.lineWidth = Math.max(1.5, crop * 0.007);
      const arm = r * 0.45;
      oc.beginPath();
      oc.moveTo(cx - arm, cy); oc.lineTo(cx + arm, cy);
      oc.moveTo(cx, cy - arm); oc.lineTo(cx, cy + arm);
      oc.stroke();

      // Convertir en image utilisable par drawImage
      const result = new Image();
      result.onload = () => resolve(result);
      result.onerror = () => resolve(null);
      result.src = out.toDataURL('image/png');
    }
  });
}

/* ── GEOCODING ── */
async function geocode(lat,lon){
  try{
    const c=new AbortController(); setTimeout(()=>c.abort(),6000);
    const r=await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`,
      {headers:{'Accept-Language':'fr','User-Agent':'GeoSnapPWA/4.0'},signal:c.signal}
    );
    if(!r.ok) throw 0;
    const d=await r.json(),a=d.address;
    const city   = a.city||a.town||a.village||a.municipality||'';
    const road   = a.road||a.pedestrian||a.footway||'';
    const num    = a.house_number||'';
    const post   = a.postcode||'';
    const street = num&&road?`${num} ${road}`:road;
    const address= [street,post&&city?`${post} ${city}`:city].filter(Boolean).join(', ')
                   ||d.display_name?.split(',').slice(0,3).join(',');
    return {city,address:address||'Adresse inconnue'};
  }catch{return{city:'',address:'Adresse indisponible'};}
}

/* ── INDEXEDDB ── */
const DB='GeoSnapDB4',VER=1,ST='photos';
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const q=indexedDB.open(DB,VER);
    q.onupgradeneeded=e=>e.target.result.createObjectStore(ST,{keyPath:'id',autoIncrement:true});
    q.onsuccess=e=>{db=e.target.result;res(db);};
    q.onerror=e=>rej(e.target.error);
  });
}
async function saveToGallery(blob,ts){
  await openDB();
  const ab=await blob.arrayBuffer();
  return new Promise((res,rej)=>{
    const tx=db.transaction(ST,'readwrite');
    tx.objectStore(ST).add({data:ab,type:blob.type,ts:ts.getTime(),city:S.address||S.city,lat:S.lat,lon:S.lon});
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}
async function loadGallery(){
  await openDB();
  return new Promise((res,rej)=>{
    const q=db.transaction(ST,'readonly').objectStore(ST).getAll();
    q.onsuccess=e=>res(e.target.result.reverse());
    q.onerror=e=>rej(e.target.error);
  });
}
async function deletePhoto(id){
  await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(ST,'readwrite');
    tx.objectStore(ST).delete(id);
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}

/* ── TABS ── */
function setTab(view){
  document.querySelectorAll('.tab').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
  const gallery = document.getElementById('view-gallery');
  const bottom  = document.getElementById('bottom');
  const hdr     = document.getElementById('hdr');
  const gpsDotEl= document.getElementById('gps-dot');
  if(view==='gallery'){
    gallery.classList.add('active');
    bottom.style.display  = 'none';
    hdr.style.display     = 'none';
    gpsDotEl.style.display= 'none';
    renderGallery();
  } else {
    gallery.classList.remove('active');
    bottom.style.display  = '';
    hdr.style.display     = '';
    gpsDotEl.style.display= '';
  }
}
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>setTab(btn.dataset.view));
});

/* ── GALERIE RENDER ── */
async function renderGallery(){
  const items=await loadGallery();
  const grid=document.getElementById('gallery-grid');
  const empty=document.getElementById('gallery-empty');
  grid.innerHTML='';
  if(!items.length){empty.style.display='flex';grid.style.display='none';return;}
  empty.style.display='none'; grid.style.display='grid';
  items.forEach((item,idx)=>{
    const blob=new Blob([item.data],{type:item.type});
    const url=URL.createObjectURL(blob);
    const d=new Date(item.ts);
    const label=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
               +' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const div=document.createElement('div');
    div.className='gitem';
    div.innerHTML=`<img src="${url}" loading="lazy"><div class="gitem-meta">${label}${item.city?'<br>'+item.city:''}</div><button class="gitem-del">✕</button>`;
    div.querySelector('img').onclick=()=>openSwiper(items, idx);
    div.querySelector('.gitem-del').onclick=async e=>{
      e.stopPropagation();
      await deletePhoto(item.id);
      URL.revokeObjectURL(url);
      renderGallery();
      showToast('🗑 Supprimée');
    };
    grid.appendChild(div);
  });
}

/* ── SWIPER ── */
const swiper      = document.getElementById('swiper');
const swiperTrack = document.getElementById('swiper-track');
const swiperIndex = document.getElementById('swiper-index');
const swiperShare = document.getElementById('swiper-share');
const swiperDel   = document.getElementById('swiper-del');
let swItems = []; // [{blob,ts,id}]
let swCur   = 0;
let swStartX = 0, swDragging = false, swDragDelta = 0;

function openSwiper(items, startIdx) {
  swItems = items; swCur = startIdx;
  swiperTrack.innerHTML = '';
  items.forEach((item,i) => {
    const slide = document.createElement('div');
    slide.className = 'swiper-slide';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(new Blob([item.data],{type:item.type}));
    img.draggable = false;
    slide.appendChild(img);
    swiperTrack.appendChild(slide);
  });
  swiper.classList.add('open');
  updateSwiperPos(false);
}

function updateSwiperPos(animate=true) {
  swiperTrack.style.transition = animate ? 'transform .28s cubic-bezier(.4,0,.2,1)' : 'none';
  swiperTrack.style.transform = `translateX(${-swCur * 100}%)`;
  swiperIndex.textContent = `${swCur+1} / ${swItems.length}`;
}

function closeSwiper() {
  swiper.classList.remove('open');
  // Revoke object URLs
  swiperTrack.querySelectorAll('img').forEach(img => URL.revokeObjectURL(img.src));
  swiperTrack.innerHTML = '';
  swItems = [];
}

document.getElementById('swiper-back').onclick = closeSwiper;
document.getElementById('swiper-close').onclick = closeSwiper;

swiperShare.onclick = () => {
  const item = swItems[swCur];
  if (item) shareBlob(new Blob([item.data],{type:item.type}), new Date(item.ts));
};

swiperDel.onclick = async () => {
  const item = swItems[swCur];
  if (!item) return;
  await deletePhoto(item.id);
  swItems.splice(swCur,1);
  if (!swItems.length) { closeSwiper(); await renderGallery(); return; }
  if (swCur >= swItems.length) swCur = swItems.length-1;
  // Rebuild track
  openSwiper(swItems, swCur);
  await renderGallery();
  showToast('🗑 Supprimée');
};

// Touch / Mouse swipe
swiper.addEventListener('pointerdown', e => {
  swStartX = e.clientX; swDragging = true; swDragDelta = 0;
  swiperTrack.style.transition = 'none';
});
swiper.addEventListener('pointermove', e => {
  if (!swDragging) return;
  swDragDelta = e.clientX - swStartX;
  swiperTrack.style.transform = `translateX(calc(${-swCur*100}% + ${swDragDelta}px))`;
});
swiper.addEventListener('pointerup', e => {
  if (!swDragging) return;
  swDragging = false;
  const threshold = window.innerWidth * 0.25;
  if (swDragDelta < -threshold && swCur < swItems.length-1) swCur++;
  else if (swDragDelta > threshold && swCur > 0) swCur--;
  updateSwiperPos(true);
});
swiper.addEventListener('pointercancel', () => {
  swDragging = false;
  updateSwiperPos(true);
});

async function shareBlob(blob,ts){
  const name=`GeoSnap_${ts.toISOString().replace(/[:.]/g,'-').slice(0,19)}.jpg`;
  const file=new File([blob],name,{type:'image/jpeg'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:'GeoSnap'});showToast('✅ Partagé','ok');return;}
    catch(e){if(e.name==='AbortError') return;}
  }
  const url=URL.createObjectURL(blob);
  const a=Object.assign(document.createElement('a'),{href:url,download:name});
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast('⬇️ Téléchargée','ok');
}

/* ── TOAST ── */
let toastT;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+(type||'');
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='',2800);
}
