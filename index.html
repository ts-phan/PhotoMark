<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoSnap">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>GeoSnap</title>
  <style>
    :root {
      --red:   #E8202A;
      --white: #F0F0F5;
      --muted: rgba(255,255,255,0.55);
      --surf:  rgba(15,15,20,0.82);
      --sans:  -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --mono:  "SF Mono","Fira Code","Courier New",monospace;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body {
      width:100%; height:100%;
      overflow:hidden;
      background:#000;
      font-family:var(--sans);
      color:var(--white);
      /* Fix iOS status bar */
      padding-top: env(safe-area-inset-top);
    }

    /* ══════════════════════════════
       FULLSCREEN STAGE
    ══════════════════════════════ */
    #stage {
      position: fixed;
      inset: 0;
      top: env(safe-area-inset-top);
      bottom: env(safe-area-inset-bottom);
    }

    /* Live video & canvas = même taille */
    #live-video, #annotated {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #annotated {
      display: none;
      cursor: pointer;
    }

    /* ══════════════════════════════
       OVERLAY HEADER (flottant)
    ══════════════════════════════ */
    #overlay-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
    }
    .logo-dot {
      width: 9px; height: 9px; background: var(--red);
      border-radius: 50%; box-shadow: 0 0 7px var(--red);
    }
    .logo span { color: var(--red); }

    /* Tabs flottants */
    .tab-group {
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 3px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .tab {
      padding: 7px 16px;
      font-size: 13px; font-weight: 600;
      border: none; border-radius: 18px;
      cursor: pointer; color: var(--muted);
      background: transparent;
      transition: background .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { background: var(--red); color: white; }

    /* GPS badge discret */
    #gps-dot {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      transition: background .4s, box-shadow .4s;
      z-index: 31;
    }
    #gps-dot.active { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
    #gps-dot.error  { background: var(--red); }

    /* ══════════════════════════════
       OVERLAY BOTTOM (flottant)
    ══════════════════════════════ */
    #overlay-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding-bottom: max(28px, env(safe-area-inset-bottom) + 16px);
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
    }

    /* Bouton déclencheur */
    #shutter-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0 8px;
    }
    #shutter-btn {
      width: 74px; height: 74px;
      border-radius: 50%;
      background: transparent;
      border: 3px solid rgba(255,255,255,0.85);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s;
      position: relative;
    }
    #shutter-btn::after {
      content: '';
      width: 58px; height: 58px;
      border-radius: 50%;
      background: white;
      position: absolute;
      transition: transform .1s, background .1s;
    }
    #shutter-btn:active { transform: scale(.93); }
    #shutter-btn:active::after { background: #ccc; }
    #shutter-btn.hidden { display: none; }

    /* Boutons post-capture */
    #post-actions {
      display: none;
      flex-direction: row;
      gap: 12px;
      padding: 12px 24px 4px;
      width: 100%;
    }
    #post-actions.visible { display: flex; }
    .post-btn {
      flex: 1;
      padding: 14px 10px;
      font-size: 14px; font-weight: 600;
      border: none; border-radius: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .15s, transform .1s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .post-btn:active { opacity: .8; transform: scale(.98); }
    #btn-retake {
      background: rgba(30,30,40,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
    }
    #btn-save {
      background: rgba(34,197,94,0.85);
      border: 1px solid rgba(34,197,94,0.4);
      color: white;
    }

    /* Fallback si pas de getUserMedia */
    #cam-label-fallback {
      display: none;
      padding: 14px 28px;
      background: var(--red);
      color: white;
      font-size: 15px; font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    #cam-label-fallback.show { display: block; }
    input[type="file"] { display: none; }

    /* ══════════════════════════════
       PROCESSING OVERLAY
    ══════════════════════════════ */
    #processing {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      backdrop-filter: blur(3px);
      z-index: 40;
    }
    #processing.active { display: flex; }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #processing p { font-size: 12px; color: var(--muted); font-family: var(--mono); }

    /* ══════════════════════════════
       VUE GALERIE (par-dessus le stage)
    ══════════════════════════════ */
    #view-gallery {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      flex-direction: column;
      background: #0A0A0F;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #view-gallery.active { display: flex; }

    #gallery-scroll {
      flex: 1;
      padding: 8px 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom) + 16px);
    }
    #gallery-empty {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: rgba(255,255,255,0.35);
      padding: 60px 0;
    }
    .empty-icon { font-size: 48px; }
    #gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 3/4;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      background: #1C1C27;
    }
    .gallery-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .gallery-item-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,.82));
      font-size: 10px; font-family: var(--mono);
      color: rgba(255,255,255,.85); line-height: 1.4;
    }
    .gallery-del {
      position: absolute; top: 6px; right: 6px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,.65); border: none;
      color: white; font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.96); z-index: 100;
      align-items: center; justify-content: center; flex-direction: column; gap: 18px;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width:100%; max-height:78dvh; object-fit:contain; border-radius:10px; }
    #lb-close {
      position: fixed; top: max(16px,env(safe-area-inset-top)+8px); right: 20px;
      background: rgba(30,30,40,.9); border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%; font-size:17px;
      cursor: pointer; display:flex; align-items:center; justify-content:center; z-index:101;
    }
    #lb-share {
      background: var(--red); color: white; border: none;
      padding: 13px 36px; border-radius: 30px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ══════════════════════════════
       TOAST
    ══════════════════════════════ */
    #toast {
      position: fixed;
      bottom: max(36px, env(safe-area-inset-bottom) + 24px);
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: rgba(28,28,40,0.95);
      color: var(--white);
      padding: 11px 20px; border-radius: 30px;
      font-size: 13px; opacity: 0;
      transition: opacity .3s, transform .3s;
      white-space: nowrap; z-index: 200;
      border: 1px solid rgba(255,255,255,.08);
      pointer-events: none;
      backdrop-filter: blur(10px);
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(74,222,128,.35); }
    #toast.error   { border-color: rgba(232,32,42,.4); }
  </style>
</head>
<body>

<!-- ═══ STAGE PLEIN ÉCRAN ═══ -->
<div id="stage">

  <!-- Flux caméra live -->
  <video id="live-video" autoplay playsinline muted></video>

  <!-- Canvas avec annotation (après capture) -->
  <canvas id="annotated"></canvas>

  <!-- Header flottant -->
  <div id="overlay-header">
    <div class="logo">
      <div class="logo-dot"></div>
      Geo<span>Snap</span>
    </div>
    <div class="tab-group">
      <button class="tab active" data-view="camera">📷 Caméra</button>
      <button class="tab" data-view="gallery">🖼 Galerie</button>
    </div>
  </div>
  <div id="gps-dot"></div>

  <!-- Bottom flottant -->
  <div id="overlay-bottom">
    <!-- Post-capture : Nouvelle + Enregistrer -->
    <div id="post-actions">
      <button id="btn-retake" class="post-btn">🔄 Nouvelle</button>
      <button id="btn-save"   class="post-btn">💾 Enregistrer</button>
    </div>
    <!-- Déclencheur live -->
    <div id="shutter-wrap">
      <button id="shutter-btn" aria-label="Prendre une photo"></button>
    </div>
    <!-- Fallback -->
    <label id="cam-label-fallback" for="cameraInput">📷 Prendre une photo</label>
    <input type="file" accept="image/*" capture="environment" id="cameraInput">
  </div>

  <!-- Overlay processing -->
  <div id="processing">
    <div class="spinner"></div>
    <p id="proc-label">Traitement…</p>
  </div>

  <!-- Galerie par-dessus le stage -->
  <div id="view-gallery">
    <div id="gallery-scroll">
      <div id="gallery-empty">
        <div class="empty-icon">📂</div>
        <p style="font-size:14px">Aucune photo</p>
        <p style="font-size:12px;opacity:.6">Prenez votre première photo !</p>
      </div>
      <div id="gallery-grid" style="display:none"></div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-share">📤 Partager / Enregistrer</button>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   SERVICE WORKER
═══════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const S = {
  lat:0, lon:0, gpsReady:false,
  city:'', address:'',
  now:null, mapImg:null,
  stream:null,
  currentBlob:null,
  mode:'camera', // 'camera' | 'preview' | 'gallery'
};

/* ═══════════════════════════════════════════
   DOM
═══════════════════════════════════════════ */
const video       = document.getElementById('live-video');
const canvas      = document.getElementById('annotated');
const ctx         = canvas.getContext('2d');
const shutterBtn  = document.getElementById('shutter-btn');
const shutterWrap = document.getElementById('shutter-wrap');
const postActions = document.getElementById('post-actions');
const btnRetake   = document.getElementById('btn-retake');
const btnSave     = document.getElementById('btn-save');
const camFallback = document.getElementById('cam-label-fallback');
const cameraInput = document.getElementById('cameraInput');
const gpsDot      = document.getElementById('gps-dot');
const processing  = document.getElementById('processing');
const procLabel   = document.getElementById('proc-label');

/* ═══════════════════════════════════════════
   GPS
═══════════════════════════════════════════ */
function initGPS() {
  if (!navigator.geolocation) { gpsDot.className='error'; return; }
  navigator.geolocation.watchPosition(
    pos => {
      S.lat = pos.coords.latitude;
      S.lon = pos.coords.longitude;
      S.gpsReady = true;
      gpsDot.className = 'active';
      geocode(S.lat, S.lon).then(r => { S.city=r.city; S.address=r.address; });
    },
    () => { gpsDot.className='error'; },
    { enableHighAccuracy:true, maximumAge:15000, timeout:10000 }
  );
}
initGPS();

/* ═══════════════════════════════════════════
   CAMERA — caméra arrière uniquement
═══════════════════════════════════════════ */
async function startCamera() {
  try {
    if (S.stream) { S.stream.getTracks().forEach(t=>t.stop()); S.stream=null; }
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact:'environment' }, width:{ideal:1920}, height:{ideal:2560} },
      audio: false
    });
    S.stream = stream;
    video.srcObject = stream;
    video.style.display = 'block';
    canvas.style.display = 'none';
    camFallback.classList.remove('show');
    shutterWrap.style.display = 'flex';
  } catch(e) {
    // Essai sans 'exact' (certains appareils)
    try {
      if (S.stream) { S.stream.getTracks().forEach(t=>t.stop()); S.stream=null; }
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:2560} },
        audio: false
      });
      S.stream = stream;
      video.srcObject = stream;
      video.style.display = 'block';
      canvas.style.display = 'none';
      camFallback.classList.remove('show');
      shutterWrap.style.display = 'flex';
    } catch(e2) {
      // Fallback input file
      video.style.display = 'none';
      camFallback.classList.add('show');
      shutterWrap.style.display = 'none';
    }
  }
}
startCamera();

/* ═══════════════════════════════════════════
   CAPTURE
═══════════════════════════════════════════ */
shutterBtn.addEventListener('click', captureFromVideo);
cameraInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  S.now = new Date();
  showProcessing('Lecture…');
  const url = URL.createObjectURL(file);
  const img = await loadImage(url);
  URL.revokeObjectURL(url);
  const off = document.createElement('canvas');
  off.width=img.naturalWidth; off.height=img.naturalHeight;
  off.getContext('2d').drawImage(img,0,0);
  cameraInput.value='';
  await processImage(off);
});

async function captureFromVideo() {
  S.now = new Date();
  showProcessing('Capture…');
  const W = video.videoWidth  || 1080;
  const H = video.videoHeight || 1920;
  const off = document.createElement('canvas');
  off.width=W; off.height=H;
  off.getContext('2d').drawImage(video,0,0,W,H);
  await processImage(off);
}

/* ═══════════════════════════════════════════
   PIPELINE
═══════════════════════════════════════════ */
async function processImage(src) {
  try {
    procLabel.textContent = 'Recadrage…';
    fitCanvasToScreen(src);

    procLabel.textContent = 'Carte…';
    S.mapImg = S.gpsReady ? await getMapTile(S.lat, S.lon) : null;

    procLabel.textContent = 'Annotation…';
    drawAnnotations();

    S.currentBlob = await canvasToBlob(canvas);
    await saveToGallery(S.currentBlob, S.now);

    // Afficher le résultat
    video.style.display   = 'none';
    canvas.style.display  = 'block';
    shutterWrap.style.display = 'none';
    postActions.classList.add('visible');
    hideProcessing();
    S.mode = 'preview';

  } catch(err) {
    hideProcessing();
    showToast('❌ ' + err.message, 'error');
    console.error(err);
  }
}

/* ═══════════════════════════════════════════
   CANVAS — remplit l'écran exactement
═══════════════════════════════════════════ */
function fitCanvasToScreen(src) {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;

  canvas.style.width  = sw + 'px';
  canvas.style.height = sh + 'px';
  canvas.width  = sw * dpr;
  canvas.height = sh * dpr;

  // Crop centré pour remplir
  const canvasR = canvas.width / canvas.height;
  const srcR    = src.width / src.height;
  let sx=0, sy=0, sw2=src.width, sh2=src.height;
  if (srcR > canvasR) { sw2=src.height*canvasR; sx=(src.width-sw2)/2; }
  else                { sh2=src.width/canvasR;  sy=(src.height-sh2)/2; }

  ctx.drawImage(src, sx, sy, sw2, sh2, 0, 0, canvas.width, canvas.height);
}

/* ═══════════════════════════════════════════
   ANNOTATIONS — flottantes sur la photo
═══════════════════════════════════════════ */
function drawAnnotations() {
  const W = canvas.width, H = canvas.height;
  const now = state_now();
  const dpr = window.devicePixelRatio || 1;

  // Dégradé bas — zone annotation
  const grad = ctx.createLinearGradient(0, H*0.48, 0, H);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.88)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const pad  = W * 0.045;
  // Réserve le bas pour les boutons overlay
  const bottomReserve = (80 + Math.max(28, 16)) * dpr; // hauteur approx overlay bottom
  const baseY = H - bottomReserve - pad * 0.5;

  function sh(on) {
    if (on) { ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=9*dpr; ctx.shadowOffsetX=ctx.shadowOffsetY=1*dpr; }
    else    { ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=ctx.shadowOffsetY=0; }
  }

  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.textBaseline = 'bottom';

  // ── Coordonnées ──
  sh(true);
  ctx.font = `${H*0.016}px "SF Mono","Fira Code",monospace`;
  const coordStr = S.gpsReady
    ? `${S.lat.toFixed(6)}°N   ${S.lon.toFixed(6)}°E`
    : 'Coordonnées indisponibles';
  ctx.fillText(coordStr, pad, baseY);

  // ── Adresse ──
  const addrY = baseY - H*0.026;
  ctx.font = `${H*0.019}px "SF Mono","Fira Code",monospace`;
  const addrStr = S.address || S.city || 'Adresse indisponible';
  // Tronquer si trop long (canvas width)
  ctx.fillText(truncateText(ctx, addrStr, W - pad*2 - W*0.28), pad, addrY);

  // ── Heure + secondes ──
  const timeStr = now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const timeY   = addrY - H*0.013;
  ctx.font = `700 ${H*0.068}px "Arial Narrow",Arial,sans-serif`;
  ctx.fillText(timeStr, pad, timeY);

  // ── Ligne rouge ──
  const tw    = ctx.measureText(timeStr).width;
  const lineX = pad + tw + W*0.024;
  sh(false);
  ctx.strokeStyle='#E8202A'; ctx.lineWidth=W*0.005; ctx.lineCap='round';
  const lineTop = timeY - H*0.056;
  ctx.beginPath(); ctx.moveTo(lineX,timeY); ctx.lineTo(lineX,lineTop); ctx.stroke();

  // ── Date & Jour ──
  sh(true);
  ctx.fillStyle='rgba(255,255,255,.93)'; ctx.textBaseline='top';
  const dateX   = lineX + W*0.02;
  const dateStr = now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  let   dayStr  = now.toLocaleDateString('fr-FR',{weekday:'short'});
  dayStr = dayStr[0].toUpperCase()+dayStr.slice(1);
  ctx.font = `${H*0.021}px -apple-system,BlinkMacSystemFont,sans-serif`;
  ctx.fillText(dateStr, dateX, lineTop);
  ctx.fillText(dayStr,  dateX, lineTop+H*0.028);

  // ── Miniature carte ──
  if (S.mapImg) {
    const mSize = W*0.21;
    const mX    = W - pad - mSize;
    const mY    = baseY - mSize - H*0.005;
    sh(false);
    ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=10*dpr;
    ctx.fillStyle='white';
    rrect(mX-3,mY-3,mSize+6,mSize+6,mSize*.07+2); ctx.fill();
    sh(false);
    ctx.save(); rrect(mX,mY,mSize,mSize,mSize*.07); ctx.clip();
    ctx.drawImage(S.mapImg,mX,mY,mSize,mSize);
    ctx.restore();
    ctx.fillStyle='#E8202A'; ctx.strokeStyle='white'; ctx.lineWidth=2.5*dpr;
    ctx.beginPath(); ctx.arc(mX+mSize/2,mY+mSize/2,mSize*.085,0,Math.PI*2); ctx.fill(); ctx.stroke();
  }
}

function state_now() { return S.now || new Date(); }

function truncateText(ctx, text, maxWidth) {
  if (ctx.measureText(text).width <= maxWidth) return text;
  let t = text;
  while (t.length > 4 && ctx.measureText(t+'…').width > maxWidth) t = t.slice(0,-1);
  return t+'…';
}

function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

/* ═══════════════════════════════════════════
   SAVE / SHARE
═══════════════════════════════════════════ */
btnSave.addEventListener('click', async () => {
  if (!S.currentBlob) return;
  btnSave.disabled = true;
  await shareBlob(S.currentBlob, S.now);
  btnSave.disabled = false;
});

async function shareBlob(blob, ts) {
  const name = `GeoSnap_${ts.toISOString().replace(/[:.]/g,'-').slice(0,19)}.jpg`;
  const file = new File([blob], name, {type:'image/jpeg'});
  if (navigator.canShare && navigator.canShare({files:[file]})) {
    try { await navigator.share({files:[file],title:'GeoSnap'}); showToast('✅ Partagé','success'); return; }
    catch(e) { if (e.name==='AbortError') return; }
  }
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'),{href:url,download:name});
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast('⬇️ Téléchargée','success');
}

/* ═══════════════════════════════════════════
   GEOCODING
═══════════════════════════════════════════ */
async function geocode(lat,lon) {
  try {
    const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),6000);
    const r=await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1`,
      {headers:{'Accept-Language':'fr','User-Agent':'GeoSnapPWA/3.0'},signal:ctrl.signal}
    );
    if(!r.ok) throw 0;
    const d=await r.json(), a=d.address;
    const city    = a.city||a.town||a.village||a.municipality||'';
    const road    = a.road||a.pedestrian||a.footway||'';
    const num     = a.house_number||'';
    const post    = a.postcode||'';
    const street  = num&&road ? `${num} ${road}` : road;
    const address = [street, post&&city?`${post} ${city}`:city].filter(Boolean).join(', ')
                    || d.display_name?.split(',').slice(0,3).join(',') || 'Adresse inconnue';
    return {city, address};
  } catch { return {city:'',address:'Adresse indisponible'}; }
}

/* ═══════════════════════════════════════════
   MAP TILE
═══════════════════════════════════════════ */
function getMapTile(lat,lon,zoom=16){
  return new Promise(resolve=>{
    const n=2**zoom, x=Math.floor(n*(lon+180)/360);
    const lr=lat*Math.PI/180;
    const y=Math.floor(n*(1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2);
    const img=new Image(); img.crossOrigin='anonymous';
    const t=setTimeout(()=>resolve(null),5000);
    img.onload=()=>{clearTimeout(t);resolve(img);};
    img.onerror=()=>{clearTimeout(t);resolve(null);};
    img.src=`https://a.tile.openstreetmap.org/${zoom}/${x}/${y}.png`;
  });
}

const viewGallery = document.getElementById('view-gallery');

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', async () => {
    const v = btn.dataset.view;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if (v==='gallery') {
      viewGallery.classList.add('active');
      S.mode='gallery';
      await renderGallery();
    } else {
      viewGallery.classList.remove('active');
      S.mode = S.currentBlob ? 'preview' : 'camera';
      if (!S.currentBlob && S.stream) video.style.display='block';
    }
  });
});

/* ═══════════════════════════════════════════
   INDEXEDDB
═══════════════════════════════════════════ */
const DB='GeoSnapDB', VER=1, ST='photos';
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const q=indexedDB.open(DB,VER);
    q.onupgradeneeded=e=>e.target.result.createObjectStore(ST,{keyPath:'id',autoIncrement:true});
    q.onsuccess=e=>{db=e.target.result;res(db);};
    q.onerror=e=>rej(e.target.error);
  });
}
async function saveToGallery(blob,ts){
  await openDB();
  const ab=await blob.arrayBuffer();
  return new Promise((res,rej)=>{
    const tx=db.transaction(ST,'readwrite');
    tx.objectStore(ST).add({data:ab,type:blob.type,ts:ts.getTime(),city:S.address||S.city,lat:S.lat,lon:S.lon});
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}
async function loadGallery(){
  await openDB();
  return new Promise((res,rej)=>{
    const q=db.transaction(ST,'readonly').objectStore(ST).getAll();
    q.onsuccess=e=>res(e.target.result.reverse());
    q.onerror=e=>rej(e.target.error);
  });
}
async function deletePhoto(id){
  await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(ST,'readwrite');
    tx.objectStore(ST).delete(id);
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}

async function renderGallery(){
  const items=await loadGallery();
  const grid=document.getElementById('gallery-grid');
  const empty=document.getElementById('gallery-empty');
  grid.innerHTML='';
  if(!items.length){ empty.style.display='flex'; grid.style.display='none'; return; }
  empty.style.display='none'; grid.style.display='grid';
  items.forEach(item=>{
    const blob=new Blob([item.data],{type:item.type});
    const url=URL.createObjectURL(blob);
    const d=new Date(item.ts);
    const label=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})
               +' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const div=document.createElement('div');
    div.className='gallery-item';
    div.innerHTML=`<img src="${url}" loading="lazy"><div class="gallery-item-meta">${label}${item.city?'<br>'+item.city:''}</div><button class="gallery-del">✕</button>`;
    div.querySelector('img').onclick=()=>openLightbox(url,blob,item);
    div.querySelector('.gallery-del').onclick=async e=>{
      e.stopPropagation();
      await deletePhoto(item.id);
      URL.revokeObjectURL(url);
      await renderGallery();
      showToast('🗑 Supprimée');
    };
    grid.appendChild(div);
  });
}

/* Lightbox */
const lightbox=document.getElementById('lightbox');
let lbBlob=null,lbTs=null;
function openLightbox(url,blob,item){
  document.getElementById('lb-img').src=url;
  lbBlob=blob; lbTs=new Date(item.ts);
  lightbox.classList.add('open');
}
document.getElementById('lb-close').onclick=()=>{lightbox.classList.remove('open');document.getElementById('lb-img').src='';};
document.getElementById('lb-share').onclick=()=>{ if(lbBlob&&lbTs) shareBlob(lbBlob,lbTs); };

function loadImage(src){
  return new Promise((res,rej)=>{
    const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej(new Error('Chargement image')); i.src=src;
  });
}
function canvasToBlob(c){ return new Promise(res=>c.toBlob(res,'image/jpeg',.95)); }
function showProcessing(msg){ procLabel.textContent=msg; processing.classList.add('active'); }
function hideProcessing(){ processing.classList.remove('active'); }
let toastT;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+(type||'');
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='',3200);
}
